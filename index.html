<!DOCTYPE html>
<html>
<head>
    <title>Poik Poik - AI Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; font-family: system-ui; }
        .header {
            text-align: center;
            padding: 20px;
            background: black;
            border-bottom: 1px solid #222;
        }
        h1 { color: white; font-size: 24px; }
        .sub { color: #888; font-size: 14px; margin-top: 5px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 4px;
            padding: 4px;
        }
        .gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Poik Poik</h1>
        <div class="sub">AI Generated Gallery</div>
    </div>
    <div class="gallery">
        <img src="images/img1.jpg" loading="lazy">
        <img src="images/img2.jpg" loading="lazy">
        <img src="images/img3.jpg" loading="lazy">
        <img src="images/img4.jpg" loading="lazy">
        <img src="images/img5.jpg" loading="lazy">
    </div>
    <footer>Generated by Poik Ghost • Updates every 2 hours</footer>
</body>
</html>
