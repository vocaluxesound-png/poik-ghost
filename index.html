<!DOCTYPE html>
<html>
<head>
    <title>Poik Poik - AI Gallery</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; font-family: system-ui, -apple-system, sans-serif; }
        .header {
            text-align: center;
            padding: 20px;
            background: black;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
        }
        h1 {
            color: white;
            font-size: 24px;
            letter-spacing: -0.5px;
        }
        .sub {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 4px;
            padding: 4px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.02);
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 12px;
        }
        .refresh-note {
            text-align: center;
            padding: 10px;
            color: #00ff88;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Poik Poik</h1>
        <div class="sub">AI Generated Visual Feed</div>
    </div>
    <div class="gallery" id="gallery"></div>
    <div class="refresh-note">✨ New images generated automatically by the Ghost</div>
    <footer>Powered by Poik Ghost • Every 2 hours</footer>

    <script>
        // List all the images from your folder
        const imageNames = [
            "img1.jpg",
            "img2.jpg",
            "img3.jpg",
            "img4.jpg",
            "img5.jpg",
            "img_1776932873_1.jpg",
            "img_1776932876_2.jpg",
            "img_1776932966_3.jpg",
            "img_1776933056_4.jpg",
            "img_1776933146_5.jpg"
        ];
        
        const gallery = document.getElementById('gallery');
        
        imageNames.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `images/${imgName}`;
            img.alt = "AI Generated Image";
            img.loading = "lazy";
            
            const div = document.createElement('div');
            div.appendChild(img);
            gallery.appendChild(div);
        });
        
        console.log(`Loaded ${imageNames.length} images`);
    </script>
</body>
</html>
