<!DOCTYPE html>
<html>
<head>
    <title>Poik Poik - AI Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; font-family: system-ui; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 4px;
            padding: 4px;
        }
        .gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        h1 {
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
        }
        .header {
            position: sticky;
            top: 0;
            background: black;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Poik Poik • AI Gallery</h1>
    </div>
    <div class="gallery" id="gallery"></div>
    <script>
        const images = [
    'img_1776932873_1.jpg',
    'img_1776932876_2.jpg',
    'img_1776932966_3.jpg',
    'img_1776933056_4.jpg',
    'img_1776933146_5.jpg',
        ];
        const gallery = document.getElementById('gallery');
        images.forEach(img => {
            const div = document.createElement('div');
            div.innerHTML = `<img src="images/${img}" loading="lazy">`;
            gallery.appendChild(div.firstChild);
        });
    </script>
</body>
</html>
