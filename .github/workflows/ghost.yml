name: Poik Ghost - Auto Image Generator

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate AI Images
        run: |
          mkdir -p images
          for i in 1 2 3 4 5; do
            curl -s "https://image.pollinations.ai/prompt/cyberpunk%20city%20night%20rain%20photorealistic%208k?seed=$RANDOM" > images/img_$(date +%s)_$i.jpg
            sleep 2
          done
          
      - name: Update Website
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Poik Poik - AI Gallery</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { background: black; font-family: system-ui; }
                  .gallery {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                      gap: 4px;
                      padding: 4px;
                  }
                  .gallery img {
                      width: 100%;
                      aspect-ratio: 1;
                      object-fit: cover;
                  }
                  h1 {
                      color: white;
                      text-align: center;
                      padding: 20px;
                      font-size: 24px;
                  }
                  .header {
                      position: sticky;
                      top: 0;
                      background: black;
                      z-index: 100;
                  }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>⚡ Poik Poik • AI Gallery</h1>
              </div>
              <div class="gallery" id="gallery"></div>
              <script>
                  const images = [
          EOF
          
          for img in images/*.jpg; do
            if [ -f "$img" ]; then
              echo "    '$(basename "$img")'," >> index.html
            fi
          done
          
          cat >> index.html << 'EOF'
                  ];
                  const gallery = document.getElementById('gallery');
                  images.forEach(img => {
                      const div = document.createElement('div');
                      div.innerHTML = `<img src="images/${img}" loading="lazy">`;
                      gallery.appendChild(div.firstChild);
                  });
              </script>
          </body>
          </html>
          EOF
          
      - name: Commit and Push
        run: |
          git config user.name "Poik Ghost"
          git config user.email "ghost@poik.com"
          git add images/ index.html
          git commit -m "Auto-generated images $(date)" || exit 0
          git push
