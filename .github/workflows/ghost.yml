name: Poik Ghost - Auto Image Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate AI Images
        run: |
          mkdir -p images
          
          # Simple working prompts
          echo "Generating image 1..."
          curl --retry 3 --fail -o images/img1.jpg "https://picsum.photos/1024/1024?random=1"
          
          echo "Generating image 2..."
          curl --retry 3 --fail -o images/img2.jpg "https://picsum.photos/1024/1024?random=2"
          
          echo "Generating image 3..."
          curl --retry 3 --fail -o images/img3.jpg "https://picsum.photos/1024/1024?random=3"
          
          echo "Generating image 4..."
          curl --retry 3 --fail -o images/img4.jpg "https://picsum.photos/1024/1024?random=4"
          
          echo "Generating image 5..."
          curl --retry 3 --fail -o images/img5.jpg "https://picsum.photos/1024/1024?random=5"
          
          echo "All images generated successfully!"
      
      - name: Create HTML Gallery
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Poik Poik - AI Gallery</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { background: black; font-family: system-ui; }
                  .header {
                      text-align: center;
                      padding: 20px;
                      background: black;
                      border-bottom: 1px solid #222;
                  }
                  h1 { color: white; font-size: 24px; }
                  .sub { color: #888; font-size: 14px; margin-top: 5px; }
                  .gallery {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                      gap: 4px;
                      padding: 4px;
                  }
                  .gallery img {
                      width: 100%;
                      aspect-ratio: 1;
                      object-fit: cover;
                  }
                  footer {
                      text-align: center;
                      padding: 20px;
                      color: #444;
                      font-size: 12px;
                  }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>⚡ Poik Poik</h1>
                  <div class="sub">AI Generated Gallery</div>
              </div>
              <div class="gallery">
                  <img src="images/img1.jpg" loading="lazy">
                  <img src="images/img2.jpg" loading="lazy">
                  <img src="images/img3.jpg" loading="lazy">
                  <img src="images/img4.jpg" loading="lazy">
                  <img src="images/img5.jpg" loading="lazy">
              </div>
              <footer>Generated by Poik Ghost • Updates every 2 hours</footer>
          </body>
          </html>
          EOF
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ index.html
          git commit -m "Ghost: Generated images $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
