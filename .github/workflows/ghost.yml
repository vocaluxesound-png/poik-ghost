name: Poik Ghost - Auto Image Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate Realistic AI Images
        run: |
          mkdir -p images
          
          PROMPTS=(
            "photorealistic portrait beautiful woman cyberpunk city night rain neon lights 8k cinematic"
            "ultra realistic japanese garden sunset cherry blossoms golden hour professional photography"
            "photorealistic luxury sports car rainy tokyo street night reflections cinematic 8k"
            "realistic cozy coffee shop interior warm lighting bookshelf plants architectural 8k"
            "stunning realistic northern lights over snow mountain clear stars night sky national geographic"
          )
          
          for i in {0..4}; do
            curl -L -o "images/img_$(date +%s)_$i.jpg" "https://image.pollinations.ai/prompt/${PROMPTS[$i]}?width=1024&height=1024&nologo=true"
            echo "Generated image $i"
            sleep 3
          done
      
      - name: Create Gallery HTML
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Poik Poik - AI Gallery</title>
              <meta charset="UTF-8">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { background: black; font-family: system-ui; }
                  .header {
                      position: sticky;
                      top: 0;
                      background: black;
                      padding: 20px;
                      text-align: center;
                      border-bottom: 1px solid #222;
                  }
                  h1 { color: white; font-size: 24px; }
                  .sub { color: #888; font-size: 14px; margin-top: 5px; }
                  .gallery {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                      gap: 4px;
                      padding: 4px;
                  }
                  .gallery img {
                      width: 100%;
                      aspect-ratio: 1;
                      object-fit: cover;
                  }
                  .gallery img:hover {
                      transform: scale(1.02);
                      transition: transform 0.3s;
                  }
                  footer {
                      text-align: center;
                      padding: 20px;
                      color: #444;
                      font-size: 12px;
                  }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>⚡ Poik Poik</h1>
                  <div class="sub">Photorealistic AI Gallery</div>
              </div>
              <div class="gallery" id="gallery"></div>
              <footer>Generated by Poik Ghost • Every 2 hours</footer>
              <script>
                  const images = [
          EOF
          
          for img in images/*.jpg; do
            if [ -f "$img" ]; then
              echo "    '$(basename "$img")'," >> index.html
            fi
          done
          
          cat >> index.html << 'EOF'
                  ];
                  const gallery = document.getElementById('gallery');
                  if (images.length === 0) {
                      gallery.innerHTML = '<div style="color:white;text-align:center;padding:50px">Ghost is generating images...</div>';
                  } else {
                      images.forEach(img => {
                          const div = document.createElement('div');
                          div.innerHTML = `<img src="images/${img}" loading="lazy">`;
                          gallery.appendChild(div.firstChild);
                      });
                  }
              </script>
          </body>
          </html>
          EOF
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ index.html
          git commit -m "Ghost: Generated realistic images $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
